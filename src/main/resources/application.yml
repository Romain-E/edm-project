spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/docmanager
    username: ${DB_USERNAME:docmanager}
    password: ${DB_PASSWORD:docmanager}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: docmanager-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.romain.docmanager.event"

server:
  port: 8080

aws:
  s3:
    bucket-name: ${S3_BUCKET_NAME:docmanager-bucket}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${S3_ENDPOINT:}  # leave empty for real AWS, set for LocalStack

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please}
    expiration-ms: 86400000  # 24 hours

kafka:
  topics:
    document-uploaded: document.uploaded
    document-deleted: document.deleted

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
